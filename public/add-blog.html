<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog | MyBlog</title>
</head>
<body>

    <!-- Header -->
    <header>

        <h1>MyBlog</h1>

        <nav>
            <a href="index.html">Home</a> |
            <a href="add-blog.html">Add Blog</a>
        </nav>

    </header>

    <hr>

    <!-- Add Blog Form -->

    <main>

        <h2>Add a New Blog Post</h2>

        <p>Fill in the details below to publish a new blog post.</p>

        <form>

            <label>Blog Title</label><br>
            <input type="text" placeholder="Enter blog title"><br><br>

            <label>Author Name</label><br>
            <input type="text" placeholder="Enter your name"><br><br>

            <label>Category</label><br>

            <select>
                <option>Technology</option>
                <option>Programming</option>
                <option>Web Development</option>
                <option>JavaScript</option>
                <option>HTML</option>
                <option>CSS</option>
            </select>

            <br><br>

            <label>Blog Content</label><br>

            <textarea rows="8" cols="60" placeholder="Write your blog content here..."></textarea>

            <br><br>

            <button type="submit">Publish Blog</button>

        </form>

    </main>

    <hr>

    <!-- Footer -->

    <footer>

        <p>© 2026 MyBlog | Built during Codomax Full Stack Internship</p>

        <p>
            Follow us on
            <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
        </p>

    </footer>

</body>
</html>
