<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Blog | Simple Blog Management System</title>
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <nav>
      <div class="logo">
        <h2>MyBlog</h2>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Add Blog</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section class="form-section">
      <h1>Add a New Blog Post</h1>
      <p>Fill in the details below to publish a new blog post.</p>

      <!-- Note: Actual submission logic (Fetch/Express) comes in Day 4 & Day 6 -->
      <form id="add-blog-form">
        <div class="form-group">
          <label for="blog-title">Blog Title</label>
          <input type="text" id="blog-title" name="title" placeholder="Enter blog title" required>
        </div>

        <div class="form-group">
          <label for="blog-author">Author Name</label>
          <input type="text" id="blog-author" name="author" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
          <label for="blog-category">Category</label>
          <select id="blog-category" name="category">
            <option value="technology">Technology</option>
            <option value="lifestyle">Lifestyle</option>
            <option value="education">Education</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="blog-content">Blog Content</label>
          <textarea id="blog-content" name="content" rows="8" placeholder="Write your blog content here..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Publish Blog</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 MyBlog | Built during Codomax Full Stack Internship</p>
    <p><a href="https://in.linkedin.com/company/codomaxdigital">Follow us on LinkedIn</a></p>
  </footer>

</body>
</html>
